<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Redes de Apoyo USACH</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f5f5f5;
}

header {
    background: #6a0dad;
    color: white;
    text-align: center;
    padding: 20px;
}

section {
    padding: 20px;
}

.container {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 12px;
    width: 320px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

iframe {
    width: 100%;
    border-radius: 10px;
}
</style>

</head>

<body>

<header>
    <h1>Redes de Apoyo Estudiantil USACH</h1>
    <p>Autocuidado y bienestar estudiantil</p>
</header>

<section>
    <h2>Instagram</h2>

    <div class="container">

        <!-- Rucahueche -->
        <div class="card">
            <h3>Rucahueche</h3>
            <iframe src="https://www.instagram.com/rucahueche.usach/embed" height="400"></iframe>
        </div>

        <!-- VRAE -->
        <div class="card">
            <h3>VRAE</h3>
            <iframe src="https://www.instagram.com/vraeusach/embed" height="400"></iframe>
        </div>

        <!-- DBE -->
        <div class="card">
            <h3>DBE</h3>
            <iframe src="https://www.instagram.com/dbeusach/embed" height="400"></iframe>
        </div>

    </div>
</section>

<section>
    <h2>Ubicación</h2>

    <div class="container">
        <div class="card" style="width: 90%;">
            <iframe 
                src="https://www.google.com/maps?q=Universidad+de+Santiago+de+Chile&output=embed"
                height="400">
            </iframe>
        </div>
    </div>
</section>

</body>
</html>
